<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNT Beads Assistant</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8e44ad">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #8e44ad; text-align: center; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #333; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-generate { background: #8e44ad; color: white; }
        .btn-copy { background: #27ae60; color: white; display: none; margin-top: 10px; }
        #resultArea { margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid #8e44ad; display: none; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>DNT Beads ✨</h2>
    
    <label>Article</label>
    <input type="text" id="item" placeholder="Ex: Sac perlé perla">

    <label>Prix Unitaire (CFA)</label>
    <input type="number" id="price" placeholder="Ex: 5000">

    <label>Quantité</label>
    <input type="number" id="qty" value="1">

    <label>Zone de Livraison</label>
    <select id="zone">
        <option value="0">Récupération à Odza (Gratuit)</option>
        <option value="1000">Centre-ville (1000 CFA)</option>
        <option value="1500">Périphérie (1500 CFA)</option>
        <option value="2000">Zone éloignée (2000 CFA)</option>
    </select>

    <button class="btn-generate" onclick="generateMessage()">Générer la réponse</button>
    
    <div id="resultArea"></div>
    <button id="copyBtn" class="btn-copy" onclick="copyMessage()">Copier le message</button>
</div>

<script>
    function generateMessage() {
        const item = document.getElementById('item').value || "l'article";
        const price = parseInt(document.getElementById('price').value) || 0;
        const qty = parseInt(document.getElementById('qty').value);
        const delivery = parseInt(document.getElementById('zone').value);
        const total = (price * qty) + delivery;
        const zoneText = document.getElementById('zone').options[document.getElementById('zone').selectedIndex].text;

        const message = `Hello ! Oui c'est dispo 😊. 

Pour le ${item}, le prix est de ${price.toLocaleString()} CFA l'unité. 
Pour ${qty} pièce(s) avec la livraison (${zoneText}), ça nous fait un total de ${total.toLocaleString()} CFA.

Je suis basée à Odza. Ça vous conviendrait pour quel jour ? ✨`;

        const resultArea = document.getElementById('resultArea');
        resultArea.innerText = message;
        resultArea.style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copyMessage() {
        const text = document.getElementById('resultArea').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Message copié ! Tu peux le coller dans Messenger.");
        });
    }

    // Enregistrement du Service Worker pour la PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>

</body>
</html>
